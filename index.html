<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Schedule Manager</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <header class="top-panels">
            <div class="panel widget work-style-panel">
                <div class="panel-header">今日の勤務形態</div>
                <div class="panel-value">
                    <select id="work-style-select" disabled>
                        <option value="office">本社</option>
                        <option value="remote">在宅</option>
                        <option value="learning">ラーニングセンター</option>
                        <option value="paidleave">有給</option>
                        <option value="holiday">休日</option>
                    </select>
                </div>
                <button id="open-workstyle-edit-btn" class="workstyle-edit-btn">勤務形態変更</button>
            </div>

            <div class="panel widget urgent-tasks-panel">
                <div class="panel-header">緊急タスク</div>
                <div class="panel-value">
                    <span id="urgent-task-count">0</span><span class="unit">件</span>
                </div>
                <div class="dots">
                    <span class="dot orange"></span>
                    <span class="dot blue"></span>
                </div>
            </div>

            <div class="panel widget quick-action-panel">
                <div class="panel-header">クイック操作</div>
                <div class="panel-actions">
                    <button id="add-task-btn" class="action-btn">+ タスク</button>
                    <button id="add-link-btn" class="action-btn">+ リンク</button>
                    <button id="paste-import-btn" class="action-btn file-upload-btn">+ 勤務形態取り込み</button>
                </div>
                <p id="import-status" class="import-status"></p>
            </div>
        </header>

        <main class="bottom-panels">
            <div class="panel calendar-panel">
                <div class="calendar-header">
                    <button id="prev-month" class="icon-btn">&lt;</button>
                    <h2 id="calendar-title">2024年 4月</h2>
                    <button id="next-month" class="icon-btn">&gt;</button>
                </div>
                <div class="calendar-grid">
                    <div class="day-name">S</div>
                    <div class="day-name">M</div>
                    <div class="day-name">T</div>
                    <div class="day-name">W</div>
                    <div class="day-name">T</div>
                    <div class="day-name">F</div>
                    <div class="day-name">S</div>
                    <div id="calendar-days" class="days-container"></div>
                </div>
            </div>

            <div class="panel list-panel">
                <div class="list-tabs">
                    <button class="tab active" data-target="tasks-content">タスク管理</button>
                    <button class="tab" data-target="links-content">リンクメモ</button>
                    <button class="tab" data-target="memos-content">メモ帳</button>
                </div>

                <div id="tasks-content" class="tab-content active">
                    <div class="task-group">
                        <div class="group-header" onclick="toggleGroup('today-tasks')">
                            <span class="toggle-icon">▼</span> 今日のタスク
                        </div>
                        <ul id="today-task-list" class="task-list"></ul>
                    </div>
                    <div id="selected-task-group" class="task-group" style="display: none;">
                        <div class="group-header" onclick="toggleGroup('selected-tasks')">
                            <span class="toggle-icon">▼</span> <span id="selected-task-title">選択日のタスク</span>
                        </div>
                        <ul id="selected-task-list" class="task-list"></ul>
                    </div>
                    <div class="task-group">
                        <div class="group-header" onclick="toggleGroup('future-tasks')">
                            <span class="toggle-icon">▼</span> 未来のタスク
                        </div>
                        <ul id="future-task-list" class="task-list"></ul>
                    </div>
                </div>

                <div id="links-content" class="tab-content">
                    <ul id="link-list" class="link-list"></ul>
                </div>
                <div id="memos-content" class="tab-content">
                    <div class="memo-input-row">
                        <input type="text" id="memo-input" maxlength="50" placeholder="1〜50文字でメモを入力">
                        <button id="add-memo-btn" class="btn primary">追加</button>
                    </div>
                    <p id="memo-error" class="memo-error"></p>
                    <ul id="memo-list" class="memo-list"></ul>
                </div>
            </div>
        </main>
    </div>

    <div id="task-modal" class="modal">
        <div class="modal-content panel">
            <h3>タスクを追加</h3>
            <div class="form-group">
                <input type="text" id="task-title" placeholder="タスク名を入力">
            </div>
            <div class="form-group">
                <input type="date" id="task-date">
            </div>
            <div class="modal-actions">
                <button id="cancel-task" class="btn secondary">キャンセル</button>
                <button id="save-task" class="btn primary">保存</button>
            </div>
        </div>
    </div>

    <div id="link-modal" class="modal">
        <div class="modal-content panel">
            <h3>リンクを追加</h3>
            <div class="form-group">
                <input type="text" id="link-title" placeholder="タイトル">
            </div>
            <div class="form-group">
                <input type="url" id="link-url" placeholder="https://...">
            </div>
            <div class="modal-actions">
                <button id="cancel-link" class="btn secondary">キャンセル</button>
                <button id="save-link" class="btn primary">保存</button>
            </div>
        </div>
    </div>

    <div id="paste-modal" class="modal">
        <div class="modal-content panel">
            <h3>勤務形態取り込み</h3>
            <div class="form-group">
                <textarea id="paste-input" rows="8" placeholder="Googleスプレッドシートの表（見出し行を含む）をそのまま貼り付け"></textarea>
            </div>
            <div class="modal-actions">
                <button id="cancel-paste" class="btn secondary">キャンセル</button>
                <button id="save-paste" class="btn primary">取り込み</button>
            </div>
        </div>
    </div>

    <div id="workstyle-edit-modal" class="modal">
        <div class="modal-content panel">
            <h3>勤務形態変更</h3>
            <div class="form-group">
                <input type="date" id="workstyle-edit-date">
            </div>
            <div class="form-group">
                <select id="workstyle-edit-select">
                    <option value="learning">ラーニングセンター</option>
                    <option value="office">本社</option>
                    <option value="remote">在宅</option>
                    <option value="paidleave">有給</option>
                    <option value="holiday">休日</option>
                </select>
            </div>
            <div class="modal-actions">
                <button id="cancel-workstyle-edit" class="btn secondary">キャンセル</button>
                <button id="save-workstyle-edit" class="btn primary">保存</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
